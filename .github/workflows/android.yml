name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Java JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :onebusaway-android:assembleObaMaplibreDebug

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: onebusaway-android-oba-maplibre-debug
          path: |
            onebusaway-android/build/outputs/apk/**/*.apk
